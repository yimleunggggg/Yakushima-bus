# 每周 SEO/GEO 优化方案 → Git 存档 + GitHub Issue
name: SEO weekly proposal

on:
  schedule:
    - cron: "30 9 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  seo-weekly:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate weekly proposal
        id: proposal
        run: |
          PROPOSAL=$(bash scripts/seo_report_weekly.sh)
          echo "path=$PROPOSAL" >> "$GITHUB_OUTPUT"
          WW=$(basename "$PROPOSAL" | sed 's/-proposal.md//')
          echo "week=$WW" >> "$GITHUB_OUTPUT"

      - name: Commit proposal
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/seo/proposals/
          git diff --staged --quiet || git commit -m "docs(seo): weekly proposal ${{ steps.proposal.outputs.week }}"
          git push

      - name: Send notifications
        env:
          SEO_NOTIFY_EMAIL: ${{ secrets.SEO_NOTIFY_EMAIL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM: ${{ secrets.RESEND_FROM }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          SUBJ="[YakuBus] 周报方案 ${{ steps.proposal.outputs.week }} 待确认"
          bash scripts/seo_notify.sh "${{ steps.proposal.outputs.path }}" "$SUBJ"

      - name: Open weekly review issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const week = "${{ steps.proposal.outputs.week }}";
            const label = "seo-round";
            const title = `seo-round ${week}`;
            const body = fs.readFileSync("${{ steps.proposal.outputs.path }}", "utf8")
              + "\n\n---\n**下一步**：Issue 评论 **`approve`** 执行 §2；或 Cursor 说「执行本周 SEO 方案 " + week + "」。";
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: label,
              per_page: 10,
            });
            const dup = existing.find((i) => i.title === title);
            if (dup) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: dup.number,
                body: `## 定时更新 — ${new Date().toISOString().slice(0, 10)}\n\n` + body,
              });
              core.setOutput("number", dup.number);
              return;
            }
            const { data: issue } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: [label],
              assignees: [context.repo.owner],
            });
            core.setOutput("number", issue.number);
