# 每周 SEO 摘要 → Git 存档 + 邮件/ntfy（无需 approve）
name: SEO weekly proposal

on:
  schedule:
    - cron: "30 9 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  seo-weekly:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate weekly summary
        id: proposal
        run: |
          PROPOSAL=$(bash scripts/seo_report_weekly.sh)
          echo "path=$PROPOSAL" >> "$GITHUB_OUTPUT"
          WW=$(basename "$PROPOSAL" | sed 's/-proposal.md//')
          echo "week=$WW" >> "$GITHUB_OUTPUT"

      - name: Commit proposal
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/seo/proposals/
          git diff --staged --quiet || git commit -m "docs(seo): weekly summary ${{ steps.proposal.outputs.week }}"
          git push

      - name: Send notifications
        env:
          SEO_NOTIFY_EMAIL: ${{ secrets.SEO_NOTIFY_EMAIL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM: ${{ secrets.RESEND_FROM }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          SUBJ="[YakuBus] 周报 ${{ steps.proposal.outputs.week }}"
          bash scripts/seo_notify.sh "${{ steps.proposal.outputs.path }}" "$SUBJ"
