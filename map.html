<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#143a35">
  <title>屋久島バス 路線図</title>
  <link rel="stylesheet" href="styles.css?v=rainforest-preview">
</head>
<body>
  <div class="app">
    <nav class="nav nav-main">
      <a href="index.html" data-i18n="navTime">時刻表</a>
      <a href="map.html" class="active" data-i18n="navMap">路線図</a>
      <a href="access.html" data-i18n="navAccess">上島</a>
    </nav>

    <header class="header header-compact">
      <div class="header-main">
        <h1 id="appTitle">路線図・運賃</h1>
      </div>
      <div class="header-actions">
        <div class="lang-switch" id="langSwitch">
          <button type="button" data-lang="ja">日</button>
          <button type="button" data-lang="zh">中</button>
          <button type="button" data-lang="en">EN</button>
        </div>
      </div>
    </header>

    <div class="panel">
      <div class="sec">
        <div class="sec-title" data-i18n="routeMap">公式路線図</div>
        <div class="pdf-lang-tabs" id="pdfLangTabs">
          <button type="button" data-pdf-lang="ja" data-i18n="pdfJa">日本語 PDF</button>
          <button type="button" data-pdf-lang="en" data-i18n="pdfEn">English PDF</button>
        </div>
        <div class="pdf-stage" id="pdfStage">
        <div class="pdf-viewport" id="pdfViewport">
          <div class="pdf-toolbar">
            <button type="button" id="pdfZoomOut" aria-label="zoom out">−</button>
            <button type="button" id="pdfZoomReset" aria-label="reset">100%</button>
            <button type="button" id="pdfZoomIn" aria-label="zoom in">+</button>
            <button type="button" id="pdfFullscreen" data-i18n="pdfFullscreen">全画面</button>
            <a id="pdfOpenNew" href="#" target="_blank" rel="noopener" data-i18n="pdfOpenNew">新しいタブ</a>
          </div>
          <button type="button" class="pdf-fs-close" id="pdfFsClose" data-i18n="pdfExitFullscreen">終了</button>
          <div class="pdf-loading" id="pdfLoading" data-i18n="pdfLoading">読み込み中…</div>
          <iframe id="pdfEmbed" class="pdf-frame" title="Yakushima bus route map" loading="lazy"></iframe>
        </div>
        </div>
        <p class="pdf-slow-hint" id="pdfSlowHint" hidden data-i18n="pdfSlowHint">English PDF may load slowly — open in new tab if blank.</p>
        <p class="map-hint" data-i18n="pdfHint">ピンチまたは +/- で拡大 · 表示できない場合は新しいタブで開く</p>
        <p class="pdf-source" id="pdfSourceNote"></p>
      </div>
    </div>

    <div class="panel">
      <div class="sec">
        <div class="sec-title" data-i18n="stopLookup">停留所を選ぶ</div>
        <div class="stop-panel show" id="stopPanel">
          <div class="stop-picker" id="lookupPicker">
            <input type="text" id="lookupStopInput" class="picker-input" autocomplete="off" spellcheck="false">
            <input type="hidden" id="lookupStop" value="miyanoura_port">
            <ul class="picker-list" role="listbox" hidden></ul>
          </div>
          <div class="stop-sub" id="lookupStopSub"></div>
          <div class="stop-panel-meta">
            <span class="no" id="panelNo"></span>
          </div>
          <div class="tags" id="panelTags"></div>
          <div class="actions">
            <button type="button" class="primary" id="panelTimeBtn" data-i18n="showTimetable">時刻表を見る</button>
            <button type="button" id="panelFromBtn" data-i18n="setFrom">出発に設定</button>
            <button type="button" id="panelToBtn" data-i18n="setTo">到着に設定</button>
          </div>
        </div>
      </div>
    </div>

    <div class="panel" id="farePanel">
      <div class="sec">
        <div class="sec-title" data-i18n="fareLookup">運賃検索（大人片道）</div>
        <div class="fare-form">
          <div>
            <label data-i18n="from">出発</label>
            <div class="stop-picker" id="fareFromPicker">
              <input type="text" class="picker-input" autocomplete="off" spellcheck="false">
              <input type="hidden" id="fareFrom" value="miyanoura_port">
              <ul class="picker-list" role="listbox" hidden></ul>
            </div>
            <div class="stop-sub" id="fareFromSub"></div>
          </div>
          <div>
            <label data-i18n="to">到着</label>
            <div class="stop-picker" id="fareToPicker">
              <input type="text" class="picker-input" autocomplete="off" spellcheck="false">
              <input type="hidden" id="fareTo" value="anbo">
              <ul class="picker-list" role="listbox" hidden></ul>
            </div>
            <div class="stop-sub" id="fareToSub"></div>
          </div>
        </div>
        <div class="fare-result" id="fareResult">—</div>
        <p class="fare-disclaimer" id="fareDisclaimer"></p>
      </div>
      <div class="sec">
        <div class="sec-title" data-i18n="fareNotes">運賃の注意</div>
        <ul class="info-list" id="fareNotes"></ul>
      </div>
    </div>

    <div class="panel" id="passPanel">
      <div class="sec" id="passSection"></div>
    </div>

    <details class="panel aux-block" id="passOfficesPanel">
      <summary class="aux-summary">
        <span data-i18n="passOffices">乗車券発売窓口</span>
        <span class="aux-chevron" aria-hidden="true"></span>
      </summary>
      <div class="aux-body"><ul class="info-list" id="passList"></ul></div>
    </details>

    <footer class="app-footer">
      <a href="about.html" data-i18n="navAbout">このサイトについて</a>
    </footer>
  </div>

  <div class="app-toast map-toast" id="mapToast" role="status" aria-live="polite" hidden></div>

  <div class="modal" id="timeModal" hidden>
    <div class="modal-backdrop" id="modalBackdrop"></div>
    <div class="modal-box" role="dialog" aria-modal="true">
      <button type="button" class="modal-close" id="modalClose" aria-label="close">&times;</button>
      <h3 class="modal-title" id="modalTitle"></h3>
      <div class="day-tabs modal-days" id="modalDayTabs">
        <button type="button" data-day="weekday" data-i18n="weekday">平日</button>
        <button type="button" data-day="saturday" data-i18n="saturday">土曜</button>
        <button type="button" data-day="sunday_holiday" data-i18n="sunday">日祝</button>
      </div>
      <div id="modalBody"></div>
      <p class="modal-foot"><a href="index.html" id="modalRouteLink" data-i18n="openRouteSearch">区間検索へ</a></p>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="meta-data.js"></script>
  <script src="app-core.js"></script>
  <script src="access-data.js"></script>
  <script src="map-data.js"></script>
  <script src="operator-ui.js"></script>
  <script src="stop-picker.js"></script>
  <script src="pdf-fullscreen.js"></script>
  <script src="pdf-viewer.js"></script>
  <script>
    const UI = {
      ja: {
        navTime: "バス時刻表", navMap: "路線・運賃", navAccess: "フェリー等", navAbout: "このサイトについて", title: "路線・運賃", sub: "種子島・屋久島交通",
        routeMap: "公式路線図", fareLookup: "運賃検索（大人片道）", fareNotes: "運賃の注意",
        passInfo: "屋久島ゆったり満喫乗車券", passOffices: "発売窓口", source: "出典",
        pdfLoading: "読み込み中…", pdfSlowHint: "英語PDFは読み込みに時間がかかることがあります。表示されない場合は新しいタブで開いてください。",
        from: "出発", to: "到着",
        setFrom: "出発に設定", setTo: "到着に設定", setFromDone: "出発に設定しました：{stop}",
        setToDone: "到着に設定しました：{stop}", showTimetable: "時刻表を見る",
        stopLookup: "停留所を選ぶ", stopTap: "タップして停留所を選択",
        searchPlaceholder: "停留所名（日/中/英）",
        weekday: "平日", saturday: "土曜", sunday: "日祝",
        pdfJa: "日本語 PDF", pdfEn: "English PDF",
        pdfFullscreen: "全画面", pdfExitFullscreen: "終了", pdfOpenNew: "新しいタブ",
        pdfHint: "ピンチまたは +/- で拡大 · 表示できない場合は新しいタブで開く",
        pdfSourceNote: "公式 PDF を直接読み込み（更新は公式と同期）",
        yen: "円", noFare: "区間データなし（公式PDF参照）", sameStop: "異なる停留所を選んでください",
        fareEstimate: "目安（主要停留所区間）",
        noDeps: "この日種の発車便はありません", openRouteSearch: "区間で検索（時刻表ページ）",
        openInMaps: "Maps", modalTitle: "発車時刻", toward: "方面",
      },
      zh: {
        navTime: "公交时刻表", navMap: "路线及价格", navAccess: "轮渡·上岛", navAbout: "关于本站", title: "路线及价格", sub: "种子岛·屋久岛交通",
        routeMap: "官方路线图", fareLookup: "运价查询（成人单程）", fareNotes: "运价说明",
        passInfo: "屋久岛悠享乘车券", passOffices: "发售点", source: "来源",
        pdfLoading: "加载中…", pdfSlowHint: "英文 PDF 加载可能较慢，若空白请用新窗口打开。",
        from: "出发", to: "到达",
        setFrom: "设为出发", setTo: "设为到达", setFromDone: "已设为出发：{stop}",
        setToDone: "已设为到达：{stop}", showTimetable: "查看时刻表",
        stopLookup: "选择站点", stopTap: "点击选择站点",
        searchPlaceholder: "输入站名（中/日/英）",
        weekday: "工作日", saturday: "周六", sunday: "周日·节假日",
        pdfJa: "日文 PDF", pdfEn: "英文 PDF",
        pdfFullscreen: "全屏", pdfExitFullscreen: "退出全屏", pdfOpenNew: "新窗口打开",
        pdfHint: "双指或 +/- 缩放 · 若无法显示请新窗口打开",
        pdfSourceNote: "直接加载官方 PDF 原址，官网更新后此处同步",
        yen: "日元", noFare: "暂无该区间的数据（见官方 PDF）", sameStop: "请选择不同的站点",
        fareEstimate: "预估（主要站点区间）",
        noDeps: "该日期类型无发车", openRouteSearch: "按区间查询（时刻表页）",
        openInMaps: "地图", modalTitle: "发车时刻", toward: "方向",
      },
      en: {
        navTime: "Bus timetable", navMap: "Routes & fares", navAccess: "Ferry access", navAbout: "About", title: "Routes & fares", sub: "Tanegashima Yakushima Kotsu",
        routeMap: "Official route map", fareLookup: "Fare lookup (adult one-way)", fareNotes: "Fare notes",
        passInfo: "Yakushima day pass", passOffices: "Sales offices", source: "Source",
        pdfLoading: "Loading…", pdfSlowHint: "English PDF may load slowly — open in a new tab if blank.",
        from: "From", to: "To",
        setFrom: "Set origin", setTo: "Set destination", setFromDone: "Origin set: {stop}",
        setToDone: "Destination set: {stop}", showTimetable: "View departures",
        stopLookup: "Pick a stop", stopTap: "Tap to choose a stop",
        searchPlaceholder: "Search stops (JP/ZH/EN)",
        weekday: "Weekday", saturday: "Sat", sunday: "Sun & holidays",
        pdfJa: "Japanese PDF", pdfEn: "English PDF",
        pdfFullscreen: "Fullscreen", pdfExitFullscreen: "Exit", pdfOpenNew: "Open in new tab",
        pdfHint: "Pinch or +/- to zoom · open in new tab if blank",
        pdfSourceNote: "Loads the official PDF URL directly — updates when the source updates",
        yen: "yen", noFare: "No fare data (see official PDF)", sameStop: "Pick different stops",
        fareEstimate: "Estimate (major stops)",
        noDeps: "No departures on this day type", openRouteSearch: "Search by route (timetable page)",
        openInMaps: "Maps", modalTitle: "Departures", toward: "Direction",
      },
    };

    let lang = AppCore.getLang();
    let pdfLang = localStorage.getItem("yakushima-bus-pdf-lang") || "ja";
    let pdfLoadTimer = null;
    let selectedStop = "miyanoura_port";
    let modalDay = AppCore.detectDayType();
    let pdfZoomCtl = null;
    let pdfFsCtl = null;
    let lookupPicker, fareFromPicker, fareToPicker;
    let toastTimer = { id: null };

    function showToast(message) {
      AppCore.showToast(els.mapToast, message, toastTimer);
    }

    function flashBtn(btn) {
      AppCore.flashBtn(btn);
    }

    function syncPanelActionState() {
      const id = selectedStop;
      els.panelFromBtn.classList.toggle("active-route", els.fareFrom.value === id);
      els.panelToBtn.classList.toggle("active-route", els.fareTo.value === id);
    }

    function setFareFromStop() {
      fareFromPicker.setValue(selectedStop);
      flashBtn(els.panelFromBtn);
      showToast(t("setFromDone", { stop: stopName(selectedStop) }));
      syncPanelActionState();
    }

    function setFareToStop() {
      fareToPicker.setValue(selectedStop);
      flashBtn(els.panelToBtn);
      showToast(t("setToDone", { stop: stopName(selectedStop) }));
      syncPanelActionState();
    }

    const els = {
      langSwitch: document.getElementById("langSwitch"),
      appTitle: document.getElementById("appTitle"),
      pdfStage: document.getElementById("pdfStage"),
      pdfEmbed: document.getElementById("pdfEmbed"),
      pdfViewport: document.getElementById("pdfViewport"),
      pdfLangTabs: document.getElementById("pdfLangTabs"),
      pdfSourceNote: document.getElementById("pdfSourceNote"),
      pdfZoomIn: document.getElementById("pdfZoomIn"),
      pdfZoomOut: document.getElementById("pdfZoomOut"),
      pdfZoomReset: document.getElementById("pdfZoomReset"),
      pdfFullscreen: document.getElementById("pdfFullscreen"),
      pdfOpenNew: document.getElementById("pdfOpenNew"),
      lookupStop: document.getElementById("lookupStop"),
      stopPanel: document.getElementById("stopPanel"),
      panelNo: document.getElementById("panelNo"),
      lookupStopSub: document.getElementById("lookupStopSub"),
      panelTags: document.getElementById("panelTags"),
      panelTimeBtn: document.getElementById("panelTimeBtn"),
      panelFromBtn: document.getElementById("panelFromBtn"),
      panelToBtn: document.getElementById("panelToBtn"),
      farePanel: document.getElementById("farePanel"),
      mapToast: document.getElementById("mapToast"),
      fareFrom: document.getElementById("fareFrom"),
      fareTo: document.getElementById("fareTo"),
      fareFromSub: document.getElementById("fareFromSub"),
      fareToSub: document.getElementById("fareToSub"),
      fareResult: document.getElementById("fareResult"),
      fareDisclaimer: document.getElementById("fareDisclaimer"),
      fareNotes: document.getElementById("fareNotes"),
      passList: document.getElementById("passList"),
      passSection: document.getElementById("passSection"),
      pdfLoading: document.getElementById("pdfLoading"),
      pdfSlowHint: document.getElementById("pdfSlowHint"),
      timeModal: document.getElementById("timeModal"),
      modalBackdrop: document.getElementById("modalBackdrop"),
      modalClose: document.getElementById("modalClose"),
      modalTitle: document.getElementById("modalTitle"),
      modalBody: document.getElementById("modalBody"),
      modalDayTabs: document.getElementById("modalDayTabs"),
      modalRouteLink: document.getElementById("modalRouteLink"),
    };

    function t(k, vars = {}) {
      let s = (UI[lang] && UI[lang][k]) || UI.ja[k] || k;
      Object.entries(vars).forEach(([key, val]) => { s = s.replace(`{${key}}`, val); });
      return s;
    }
    function pick(o) { return AppCore.pick(o, lang); }

    function stopName(id) {
      const s = BUS_DATA.stops[id] || MAP_DATA.stops[id];
      if (!s) return id;
      return lang === "ja" ? s.ja : (lang === "zh" ? s.zh : s.en);
    }

    function japanParts(date = new Date()) { return AppCore.japanParts(date); }

    function detectDayType(date = new Date()) { return AppCore.detectDayType(date); }

    function parseMinutes(time) { return AppCore.parseMinutes(time); }

    function getStopDepartures(stopId, dayType) {
      const groups = [];
      for (const route of BUS_DATA.routes) {
        for (const dir of route.directions) {
          if (!dir.stops.includes(stopId)) continue;
          const deps = [];
          for (const trip of dir.trips) {
            if (trip.suspended || !trip.days.includes(dayType)) continue;
            const dep = trip.times[stopId];
            if (!dep || dep === "↓") continue;
            const destId = trip.dest || dir.stops[dir.stops.length - 1];
            deps.push({ time: dep, dest: stopName(destId) });
          }
          if (!deps.length) continue;
          deps.sort((a, b) => parseMinutes(a.time) - parseMinutes(b.time));
          groups.push({
            routeName: pick(route.name),
            dirLabel: pick(dir.label),
            operator: BUS_DATA.operators[route.operator] || BUS_DATA.operators.taneyaku,
            operatorId: route.operator,
            deps,
          });
        }
      }
      return groups;
    }

    function getFare(fromId, toId) {
      if (fromId === toId) return { fare: null, kind: "none" };
      const key = `${fromId}|${toId}`;
      if (MAP_DATA.farePairs[key]) return { fare: MAP_DATA.farePairs[key], kind: "exact" };
      const a = MAP_DATA.stops[fromId]?.fareAnchor || fromId;
      const b = MAP_DATA.stops[toId]?.fareAnchor || toId;
      if (a === b) return { fare: null, kind: "none" };
      const k2 = `${a}|${b}`;
      if (MAP_DATA.farePairs[k2]) return { fare: MAP_DATA.farePairs[k2], kind: "estimate" };
      return { fare: null, kind: "none" };
    }

    function pdfUrls() {
      const m = MAP_DATA.meta || {};
      const s = BUS_DATA.meta?.sources || {};
      return { ja: m.mapPdf || s.fare, en: m.mapPdfEn || s.fareEn };
    }

    function pdfUrl() {
      const u = pdfUrls();
      return pdfLang === "en" ? u.en : u.ja;
    }

    function pdfInlineSrc(url) {
      return `${url.split("#")[0]}#toolbar=0&navpanes=0&view=FitH`;
    }

    function hidePdfLoading() {
      els.pdfLoading.hidden = true;
    }

    function initPdf() {
      const url = pdfUrl();
      els.pdfLoading.textContent = t("pdfLoading");
      els.pdfLoading.hidden = false;
      els.pdfSlowHint.hidden = pdfLang !== "en";
      if (pdfLoadTimer) clearTimeout(pdfLoadTimer);
      els.pdfEmbed.onload = hidePdfLoading;
      els.pdfEmbed.onerror = () => {
        els.pdfLoading.textContent = t("pdfSlowHint");
        pdfLoadTimer = setTimeout(hidePdfLoading, 2500);
      };
      els.pdfEmbed.src = pdfInlineSrc(url);
      els.pdfOpenNew.href = url;
      els.pdfSourceNote.innerHTML = `${t("pdfSourceNote")} <a href="${url}" target="_blank" rel="noopener">${url.split("/").pop()}</a>`;
      els.pdfLangTabs.querySelectorAll("button").forEach((b) =>
        b.classList.toggle("active", b.dataset.pdfLang === pdfLang)
      );
      pdfZoomCtl?.reset();
      pdfLoadTimer = setTimeout(hidePdfLoading, 2500);
      setTimeout(() => { if (!els.pdfLoading.hidden) els.pdfSlowHint.hidden = false; }, 5000);
    }

    function renderPassInfo() {
      const sec = ACCESS_DATA.sections.find((s) => s.id === "pass");
      if (!sec || !els.passSection) return;
      const srcUrl = ACCESS_DATA.meta.sources[sec.sourceKey];
      const srcLabel = pick(ACCESS_DATA.meta.sourceLabels[sec.sourceKey] || {});
      const note = sec.note ? `<p class="table-note">${pick(sec.note)}</p>` : "";
      const sourceLine = srcUrl
        ? `<p class="table-source">${t("source")}: <a href="${srcUrl}" target="_blank" rel="noopener">${srcLabel || srcUrl}</a></p>`
        : "";
      const head = sec.columns.map((c) => `<th>${pick(c.label)}</th>`).join("");
      const body = sec.rows.map((row) =>
        `<tr>${sec.columns.map((c) => `<td>${pick(row[c.key])}</td>`).join("")}</tr>`
      ).join("");
      els.passSection.innerHTML = `
        <div class="sec-title">${pick(sec.title)}</div>
        ${note}
        <div class="table-wrap"><table class="data-table"><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table></div>
        ${sourceLine}`;
    }

    function initPickers() {
      const searchPh = t("searchPlaceholder");
      if (!lookupPicker) {
        lookupPicker = StopPicker.mount({
          root: document.getElementById("lookupPicker"),
          hidden: els.lookupStop,
          subEl: els.lookupStopSub,
          lang,
          placeholder: searchPh,
          onChange: (id) => { selectedStop = id; updateStopPanel(); },
        });
        fareFromPicker = StopPicker.mount({
          root: document.getElementById("fareFromPicker"),
          hidden: els.fareFrom,
          subEl: els.fareFromSub,
          lang,
          placeholder: searchPh,
          onChange: () => updateFare(),
        });
        fareToPicker = StopPicker.mount({
          root: document.getElementById("fareToPicker"),
          hidden: els.fareTo,
          subEl: els.fareToSub,
          lang,
          placeholder: searchPh,
          onChange: () => updateFare(),
        });
      } else {
        lookupPicker.setLang(lang, searchPh);
        fareFromPicker.setLang(lang, searchPh);
        fareToPicker.setLang(lang, searchPh);
      }
      selectedStop = lookupPicker.getValue();
      updateStopPanel();
      updateFare();
    }

    function updateStopPanel() {
      const id = selectedStop;
      const s = BUS_DATA.stops[id] || MAP_DATA.stops[id];
      if (!s) return;
      els.panelNo.textContent = `No.${s.no}`;
      els.panelTags.innerHTML = (s.tags || []).map((tg) =>
        `<span class="tag">${pick(MAP_DATA.tagLabels[tg]) || tg}</span>`
      ).join("");
      syncPanelActionState();
    }

    function openTimetableModal() {
      modalDay = detectDayType();
      els.modalDayTabs.querySelectorAll("button").forEach((b) =>
        b.classList.toggle("active", b.dataset.day === modalDay)
      );
      renderModalBody();
      els.timeModal.hidden = false;
      document.body.classList.add("modal-open");
    }

    function closeTimetableModal() {
      els.timeModal.hidden = true;
      document.body.classList.remove("modal-open");
    }

    function renderModalBody() {
      const id = selectedStop;
      els.modalTitle.textContent = `${t("modalTitle")} — ${stopName(id)}`;
      els.modalRouteLink.href = `index.html?from=${id}&lang=${lang}`;
      const groups = getStopDepartures(id, modalDay);
      if (!groups.length) {
        els.modalBody.innerHTML = `<div class="empty">${t("noDeps")}</div>`;
        return;
      }
      els.modalBody.innerHTML = groups.map((g) => `
        <div class="modal-dir">
          <div class="modal-dir-head">
            <div class="modal-dir-title">
              ${OperatorUI.badge(g.operator, lang)}
              <span class="modal-route">${g.routeName}</span>
              <span class="modal-toward">${t("toward")} ${g.dirLabel}</span>
            </div>
            <div class="modal-pay-tags">${OperatorUI.paymentTagsHtml(g.operator, lang)}</div>
          </div>
          <div class="dep-grid">${g.deps.map((d) =>
            `<span class="dep-chip" title="${d.dest}">${d.time}</span>`
          ).join("")}</div>
        </div>
      `).join("");
    }

    function updateFare() {
      const from = els.fareFrom.value, to = els.fareTo.value;
      els.fareDisclaimer.textContent = pick(MAP_DATA.fareDisclaimer) || "";
      syncPanelActionState();
      if (from === to) {
        els.fareResult.innerHTML = `<small>${t("sameStop")}</small>`;
        return;
      }
      const { fare, kind } = getFare(from, to);
      const fromName = stopName(from), toName = stopName(to);
      if (fare) {
        const est = kind === "estimate" ? ` · ${t("fareEstimate")}` : "";
        els.fareResult.innerHTML = `¥${fare.toLocaleString()}<small>${fromName} → ${toName}${est}</small>`;
      } else {
        els.fareResult.innerHTML = `<small>${t("noFare")}</small>`;
      }
    }

    function googleMapsUrl(office) {
      const q = office.mapQuery || `${office.ja || pick(office)} 屋久島`;
      return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(q)}`;
    }

    function renderPassOffices() {
      els.passList.innerHTML = MAP_DATA.passOffices.map((o) => {
        const label = pick(o);
        const href = googleMapsUrl(o);
        return `<li><a class="map-link" href="${href}" target="_blank" rel="noopener" aria-label="${t("openInMaps")}: ${label}"><span class="map-link-label">${label}</span><span class="map-link-badge">${t("openInMaps")}</span></a></li>`;
      }).join("");
    }

    function applyI18n() {
      AppCore.setLang(lang);
      document.documentElement.lang = lang === "zh" ? "zh-CN" : lang;
      document.querySelectorAll("[data-i18n]").forEach((el) => { el.textContent = t(el.dataset.i18n); });
      pdfFsCtl?.sync();
      els.langSwitch.querySelectorAll("button").forEach((b) => b.classList.toggle("active", b.dataset.lang === lang));
      els.appTitle.textContent = t("title");
      initPdf();
      initPickers();
      els.fareNotes.innerHTML = Object.values(MAP_DATA.fareNotes).map((n) => `<li>${pick(n)}</li>`).join("");
      renderPassInfo();
      renderPassOffices();
      if (!els.timeModal.hidden) renderModalBody();
    }

    els.langSwitch.addEventListener("click", (e) => {
      const btn = e.target.closest("button[data-lang]");
      if (!btn) return;
        lang = btn.dataset.lang;
        AppCore.setLang(lang);
        applyI18n();
    });

    els.pdfLangTabs.addEventListener("click", (e) => {
      const btn = e.target.closest("button[data-pdf-lang]");
      if (!btn) return;
      pdfLang = btn.dataset.pdfLang;
      localStorage.setItem("yakushima-bus-pdf-lang", pdfLang);
      initPdf();
    });

    els.panelTimeBtn.addEventListener("click", openTimetableModal);
    els.panelFromBtn.addEventListener("click", setFareFromStop);
    els.panelToBtn.addEventListener("click", setFareToStop);

    els.modalClose.addEventListener("click", closeTimetableModal);
    els.modalBackdrop.addEventListener("click", closeTimetableModal);
    els.modalDayTabs.addEventListener("click", (e) => {
      const btn = e.target.closest("button[data-day]");
      if (!btn) return;
      modalDay = btn.dataset.day;
      els.modalDayTabs.querySelectorAll("button").forEach((b) => b.classList.toggle("active", b === btn));
      renderModalBody();
    });

    els.fareFrom.addEventListener("change", updateFare);
    els.fareTo.addEventListener("change", updateFare);

    pdfZoomCtl = bindPdfZoom({
      viewport: els.pdfViewport,
      embed: els.pdfEmbed,
      zoomIn: els.pdfZoomIn,
      zoomOut: els.pdfZoomOut,
      zoomReset: els.pdfZoomReset,
    });
    pdfFsCtl = bindPdfFullscreen({
      stage: els.pdfStage,
      toggleBtn: els.pdfFullscreen,
      getLabel: (mode) => t(mode === "exit" ? "pdfExitFullscreen" : "pdfFullscreen"),
      onFallback: () => window.open(pdfUrl(), "_blank"),
    });

    const params = new URLSearchParams(location.search);
    if (params.get("lang")) lang = params.get("lang");
    modalDay = detectDayType();
    applyI18n();
    if (params.get("stop") && MAP_DATA.stops[params.get("stop")]) {
      lookupPicker.setValue(params.get("stop"), false);
      selectedStop = params.get("stop");
      updateStopPanel();
    }
  </script>
</body>
</html>
