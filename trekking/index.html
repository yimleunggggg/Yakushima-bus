<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="屋久島トレッキング参考：縄文杉・太鼓岩・宮之浦岳。難易度とバス接続。屋久岛徒步一日游・当地体验（Viator）参考。Yakushima trekking & guided day tours.">
  <meta name="robots" content="index, follow">
  <meta name="theme-color" content="#143a35">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="canonical" href="https://yakushimabus.com/trekking/">
  <meta property="og:title" content="屋久島トレッキング参考 | Yakushima Trekking">
  <meta property="og:url" content="https://yakushimabus.com/trekking/">
  <meta property="og:image" content="https://yakushimabus.com/og-image.png">
  <title>登山・トレッキング参考 | 屋久岛徒步 | Yakushima Trekking</title>
  <link rel="preload" href="/styles.css?v=layout-v148" as="style">
  <link rel="stylesheet" href="/styles.css?v=layout-v148">
  <script src="/clarity.js"></script>
  <script src="/analytics.js" defer></script>
  <script src="/analytics-events.js?v=analytics-v4" defer></script>
  <script src="/site-chrome.js?v=chrome-v23" defer></script>
  <script src="/lang-boot.js?v=lang-v4"></script>
  <script src="/seo-head-zh.js?v=seo-zh-v2"></script>
</head>
<body class="app-page-narrow">
  <div class="app trek-page">
    <div class="app-nav-sticky">
      <nav class="nav nav-main nav-main--6" id="mainNav" aria-label="Main">
        <a href="/map/">マップ</a>
        <a href="/">時刻表</a>
        <a href="/fare/">運賃</a>
        <a href="/ferry/">フェリー</a>
        <a href="/trekking/" class="active" aria-current="page">登山</a>
        <a href="/intro/">紹介</a>
      </nav>
      <script src="/site-chrome-nav-boot.js?v=chrome-v23"></script>
    </div>

    <header class="header header-compact">
      <div class="header-main">
        <h1 id="appTitle">登山ルート</h1>
      </div>
      <div class="header-actions">
        <div class="lang-switch" id="langSwitch">
          <button type="button" data-lang="ja">JA</button>
          <button type="button" data-lang="zh">ZH</button>
          <button type="button" data-lang="en">EN</button>
        </div>
      </div>
    </header>

    <p class="app-meta trek-lead" id="trekLead"></p>
    <p class="app-meta meta-links" id="pageCross"></p>

    <section class="panel trek-season" aria-labelledby="trekSeasonTitle">
      <h2 class="page-section-title" id="trekSeasonTitle"></h2>
      <p class="page-section-lead" id="trekSeasonLead"></p>
      <div class="trek-season-grid" id="trekSeasonGrid"></div>
    </section>

    <section class="panel trek-partner" id="trekAffiliatePanel" hidden aria-labelledby="trekAffiliateTitle"></section>

    <section class="panel trek-courses-wrap" aria-labelledby="trekCoursesTitle">
      <h2 class="page-section-title" id="trekCoursesTitle"></h2>
      <p class="page-section-note" id="trekCoursesNote" hidden></p>
      <div class="trek-courses" id="trekCourses"></div>
    </section>

    <div class="panel panel-aux">
      <div class="aux-sections aux-in-panel">
        <details class="aux-block">
          <summary class="aux-summary"><span id="trekResourcesTitle"></span><span class="aux-chevron" aria-hidden="true"></span></summary>
          <div class="aux-body">
            <div id="trekResources"></div>
          </div>
        </details>
      </div>
    </div>

    <p class="page-section-note trek-disclaimer" id="trekDisclaimer"></p>
    <p class="trek-source">
      <span id="trekSourceLabel"></span>
      <a id="trekSourceLink" href="https://yakukan.jp/trekking/" target="_blank" rel="noopener">yakukan.jp/trekking</a>
    </p>

    <footer class="app-footer"></footer>
  </div>

  <script src="/data.js?v=data-column-v3"></script>
  <script src="/map-data.js"></script>
  <script src="/partner-data.js?v=partner-v1"></script>
  <script src="/partner-ui.js?v=partner-v3"></script>
  <script src="/source-links.js?v=src-v1"></script>
  <script src="/trekking-data.js?v=trek-v7"></script>
  <script src="/app-core.js?v=core-v14"></script>
  <script>
    const UI = {
      ja: { sourceLabel: "出典：" },
      zh: { sourceLabel: "来源：" },
      en: { sourceLabel: "Source: " },
    };

    let lang = AppCore.getLang();
    const t = (key) => (UI[lang] && UI[lang][key]) || UI.ja[key] || key;

    function pick(o) {
      if (o == null) return "";
      if (typeof o === "string" || typeof o === "number") return String(o);
      return o[lang] || o.ja || o.en || o.zh || "";
    }

    function stars(n) {
      const v = Math.max(0, Math.min(5, Number(n) || 0));
      return `<span class="trek-stars" aria-label="${v}/5">${"★".repeat(v)}<span class="trek-stars-dim">${"★".repeat(5 - v)}</span></span>`;
    }

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function stopName(id) {
      const s = (typeof BUS_DATA !== "undefined" && BUS_DATA.stops[id])
        || (typeof MAP_DATA !== "undefined" && MAP_DATA.stops[id]);
      if (!s) return id;
      return lang === "ja" ? s.ja : (lang === "zh" ? s.zh : s.en);
    }

    function busRouteHref(preset) {
      if (!preset?.from) return `/?lang=${encodeURIComponent(lang)}`;
      const q = new URLSearchParams({ lang, from: preset.from });
      if (preset.to) q.set("to", preset.to);
      return `/?${q.toString()}`;
    }

    function renderAccessCompact(c, L) {
      const preset = c.presetRoute;
      if (!preset?.from) return "";
      const stops = (c.accessStops || []).filter((a) => a.stopId);
      const routeLabel = preset.to
        ? `${stopName(preset.from)} → ${stopName(preset.to)}`
        : stopName(preset.from);
      const hints = stops
        .map((a) => pick(a.note))
        .filter(Boolean)
        .join(" · ");
      return `<div class="trek-card-bus">
        <p class="trek-bus-line">
          <span class="trek-bus-route">${escapeHtml(routeLabel)}</span><span class="trek-bus-sep" aria-hidden="true">·</span><a class="trek-bus-cta" href="${busRouteHref(preset)}">${escapeHtml(pick(L.checkShuttle))}</a>
        </p>
        ${hints ? `<p class="trek-bus-hint">${escapeHtml(hints)}</p>` : ""}
      </div>`;
    }

    function applyPageHead() {
      const titleEl = document.getElementById("appTitle");
      const leadEl = document.getElementById("trekLead");
      const crossEl = document.getElementById("pageCross");
      if (window.SiteChrome) {
        SiteChrome.applyPageHead("trek", { titleEl, leadEl, crossEl, lang });
        return;
      }
      const titles = { ja: "登山ルート", zh: "登山路线", en: "Hiking routes" };
      titleEl.textContent = titles[lang] || titles.ja;
      const d = window.TREKKING_DATA;
      if (d && leadEl) leadEl.textContent = pick(d.intro);
    }

    function render() {
      const d = window.TREKKING_DATA;
      if (!d) return;
      document.documentElement.lang = lang === "zh" ? "zh-CN" : lang;
      window.__renderSiteChromeNav?.(lang);
      window.__syncPageTitle?.(lang);
      applyPageHead();
      document.getElementById("trekSeasonTitle").textContent = pick(d.seasonTitle);
      document.getElementById("trekSeasonLead").textContent = pick(d.seasonLead);
      document.getElementById("trekCoursesTitle").textContent = pick(d.coursesTitle);
      const coursesNote = document.getElementById("trekCoursesNote");
      if (coursesNote) {
        const note = pick(d.labels.busTimetableNote);
        coursesNote.textContent = note;
        coursesNote.hidden = !note;
      }
      document.getElementById("trekResourcesTitle").textContent = pick(d.resourcesTitle);
      SourceLinks.mountFlat(
        document.getElementById("trekResources"),
        (d.resources || []).map((r) => ({ url: r.url, label: r.label, note: r.note })),
        lang,
      );
      document.getElementById("trekDisclaimer").textContent = pick(d.disclaimer);
      document.getElementById("trekSourceLabel").textContent = t("sourceLabel");
      window.SiteChrome?.refresh();

      document.getElementById("trekSeasonGrid").innerHTML = d.seasons
        .map(
          (s) => `<div class="trek-season-card panel">
          <h3 class="trek-season-name">${pick(s.title)}</h3>
          <ul class="trek-season-list">${s.items.map((i) => `<li>${pick(i)}</li>`).join("")}</ul>
        </div>`
        )
        .join("");

      const trekAffiliatePanel = document.getElementById("trekAffiliatePanel");
      if (trekAffiliatePanel) {
        const affiliateHtml = window.AffiliateUI ? AffiliateUI.trekkingSectionHtml(lang) : "";
        trekAffiliatePanel.innerHTML = affiliateHtml;
        trekAffiliatePanel.hidden = !affiliateHtml;
      }

      const L = d.labels;
      document.getElementById("trekCourses").innerHTML = d.courses
        .map((c) => {
          const routeRef = c.yamapUrl
            ? `<a href="${c.yamapUrl}" target="_blank" rel="noopener">${pick(L.yamap)}</a>`
            : c.allTrailsUrl
              ? `<a href="${c.allTrailsUrl}" target="_blank" rel="noopener" title="${pick(c.title)} · ${pick(c.distance)}">${pick(L.allTrails)}</a>`
              : "";
          const refs = [
            `<a href="${c.yakukanUrl}" target="_blank" rel="noopener">${pick(L.yakukan)}</a>`,
            routeRef,
          ]
            .filter(Boolean)
            .join('<span class="trek-ref-sep" aria-hidden="true">·</span>');
          const summary = c.summary ? `<p class="trek-card-lead">${escapeHtml(pick(c.summary))}</p>` : "";
          const access = renderAccessCompact(c, L);
          const grade = `<div class="trek-card-grade" aria-label="${pick(L.difficulty)} ${c.difficulty}/5, ${pick(L.fitness)} ${c.fitness}/5">
            <span class="trek-grade-item"><span class="trek-grade-label">${pick(L.difficulty)}</span>${stars(c.difficulty)}</span>
            <span class="trek-grade-item"><span class="trek-grade-label">${pick(L.fitness)}</span>${stars(c.fitness)}</span>
          </div>`;
          const facts = `<div class="trek-card-facts">
            <span class="trek-fact trek-fact--time">${escapeHtml(pick(c.duration))}</span>
            <span class="trek-fact">${escapeHtml(pick(c.distance))}</span>
            <span class="trek-fact trek-fact--elev">${escapeHtml(pick(c.elevation))}</span>
          </div>`;
          const foot = (access || refs)
            ? `<footer class="trek-card-foot">${access}${refs ? `<div class="trek-card-refs">${refs}</div>` : ""}</footer>`
            : "";
          return `<article class="trek-card panel" id="${c.id}">
            <header class="trek-card-head">
              <h3 class="trek-card-title">${escapeHtml(pick(c.title))}</h3>
              ${summary}
            </header>
            ${facts}
            ${grade}
            ${foot}
          </article>`;
        })
        .join("");
    }

    document.getElementById("langSwitch").addEventListener("click", (e) => {
      const btn = e.target.closest("[data-lang]");
      if (!btn) return;
      lang = btn.dataset.lang;
      AppCore.setLang(lang);
      document.querySelectorAll("#langSwitch [data-lang]").forEach((b) => {
        b.classList.toggle("active", b.dataset.lang === lang);
      });
      render();
    });

    AppCore.runPageBoot((resolvedLang) => {
      lang = resolvedLang;
      AppCore.setLang(lang);
      document.querySelector(`#langSwitch [data-lang="${lang}"]`)?.classList.add("active");
      render();
    });
  </script>
</body>
</html>
