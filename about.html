<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="About Yakushima Bus (yakushimabus.com) — independent trilingual timetable tool, data sources, contact.">
  <meta name="robots" content="index, follow">
  <meta name="theme-color" content="#143a35">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48x48.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180">
  <link rel="manifest" href="/site.webmanifest">
  <link rel="canonical" href="https://yakushimabus.com/about.html">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Yakushima Bus">
  <meta property="og:title" content="About Yakushima Bus">
  <meta property="og:url" content="https://yakushimabus.com/about.html">
  <meta property="og:image" content="https://yakushimabus.com/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:alt" content="Yakushima Bus">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://yakushimabus.com/og-image.png">
  <title>关于本站 | About | 屋久島バス</title>
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "AboutPage",
    "name": "About Yakushima Bus",
    "url": "https://yakushimabus.com/about.html",
    "isPartOf": { "@type": "WebSite", "name": "Yakushima Bus", "url": "https://yakushimabus.com/" }
  }
  </script>
  <link rel="stylesheet" href="styles.css?v=rainforest-preview">
  <script src="analytics.js"></script>
</head>
<body>
  <div class="app">
    <nav class="nav nav-main">
      <a href="index.html" data-i18n="navTime">時刻表</a>
      <a href="map.html" data-i18n="navMap">路線図</a>
      <a href="access.html" data-i18n="navAccess">上島</a>
    </nav>

    <header class="header header-compact">
      <div class="header-main">
        <h1 id="appTitle">このサイトについて</h1>
      </div>
      <div class="header-actions">
        <div class="lang-switch" id="langSwitch">
          <button type="button" data-lang="ja">日</button>
          <button type="button" data-lang="zh">中</button>
          <button type="button" data-lang="en">EN</button>
        </div>
      </div>
    </header>

    <div class="meta" id="metaBar"></div>

    <div class="panel">
      <div class="sec about-body" id="aboutSections"></div>
    </div>

    <footer class="app-footer">
      <a href="index.html" id="backLink" data-i18n="backHome">時刻表に戻る</a>
    </footer>
  </div>

  <script src="about-data.js"></script>
  <script>
    const UI = {
      ja: {
        navTime: "バス時刻表", navMap: "路線・運賃", navAccess: "フェリー等",
        title: "このサイトについて", sub: "作った人・連絡先",
        updated: "更新", email: "メール", backHome: "時刻表に戻る",
      },
      zh: {
        navTime: "公交时刻表", navMap: "路线及价格", navAccess: "轮渡·上岛",
        title: "关于本站", sub: "开发者说明与联系方式",
        updated: "更新", email: "邮箱", backHome: "返回时刻表",
      },
      en: {
        navTime: "Bus timetable", navMap: "Routes & fares", navAccess: "Ferry access",
        title: "About", sub: "Who made this & contact",
        updated: "Updated", email: "Email", backHome: "Back to timetable",
      },
    };

    let lang = localStorage.getItem("yakushima-bus-lang") || "ja";

    const els = {
      langSwitch: document.getElementById("langSwitch"),
      appTitle: document.getElementById("appTitle"),
      metaBar: document.getElementById("metaBar"),
      aboutSections: document.getElementById("aboutSections"),
      backLink: document.getElementById("backLink"),
    };

    function t(k) { return (UI[lang] && UI[lang][k]) || UI.ja[k] || k; }

    function pick(o) {
      if (o == null) return "";
      if (typeof o === "string") return o;
      return o[lang] || o.ja || o.en || o.zh || "";
    }

    function renderContact() {
      const c = ABOUT_DATA.contact;
      const ig = c.instagram
        ? `<a class="contact-link" href="${c.instagram}" target="_blank" rel="noopener">${pick(c.instagramLabel) || "Instagram"}</a>`
        : `<span class="contact-link muted">${pick(c.instagramLabel)}</span>`;
      return `<div class="contact-card">
        <a class="contact-link primary" href="mailto:${c.email}">${t("email")}: ${c.email}</a>
        ${ig}
      </div>`;
    }

    function formatBody(text) {
      return pick(text)
        .split(/\n\n+/)
        .map((p) => `<p>${p}</p>`)
        .join("");
    }

    function renderSections() {
      els.aboutSections.innerHTML = ABOUT_DATA.sections.map((sec) => {
        const isContact = sec.id === "contact";
        return `<section class="about-section">
          <h2>${pick(sec.title)}</h2>
          <div class="about-prose">${formatBody(sec.body)}</div>
          ${isContact ? renderContact() : ""}
        </section>`;
      }).join("");
    }

    function applyI18n() {
      document.documentElement.lang = lang === "zh" ? "zh-CN" : lang;
      document.querySelectorAll("[data-i18n]").forEach((el) => { el.textContent = t(el.dataset.i18n); });
      els.langSwitch.querySelectorAll("button").forEach((b) => b.classList.toggle("active", b.dataset.lang === lang));
      els.appTitle.textContent = t("title");
      els.metaBar.innerHTML = `<span class="chip">${t("updated")} ${ABOUT_DATA.meta.updatedAt}</span>`;
      renderSections();
    }

    els.langSwitch.addEventListener("click", (e) => {
      const btn = e.target.closest("button[data-lang]");
      if (!btn) return;
      lang = btn.dataset.lang;
      localStorage.setItem("yakushima-bus-lang", lang);
      applyI18n();
    });

    applyI18n();
  </script>
</body>
</html>
