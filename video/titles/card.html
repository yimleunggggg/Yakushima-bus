<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1920px; height: 1080px; overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
    background: radial-gradient(ellipse 120% 80% at 50% 0%, #1f5248 0%, #0f2824 45%, #081816 100%);
    color: #f4f1ea;
    display: flex; align-items: center; justify-content: center;
  }
  .grain {
    position: absolute; inset: 0; opacity: 0.04; pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }
  .wrap { text-align: center; max-width: 1400px; padding: 80px; position: relative; z-index: 1; }
  .badge {
    display: inline-block; font-size: 18px; letter-spacing: 0.28em; text-transform: uppercase;
    color: #8f9a3a; border: 1px solid rgba(143,154,58,0.45); border-radius: 999px;
    padding: 10px 28px; margin-bottom: 48px;
  }
  h1 {
    font-size: 88px; font-weight: 700; line-height: 1.08; letter-spacing: -0.02em;
    background: linear-gradient(180deg, #fff 0%, #c8ddd6 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 28px;
  }
  .sub {
    font-size: 34px; color: rgba(244,241,234,0.72); font-weight: 400; line-height: 1.5;
  }
  .logo-row {
    position: absolute; bottom: 72px; left: 0; right: 0; text-align: center;
    font-size: 22px; color: rgba(244,241,234,0.45); letter-spacing: 0.12em;
  }
  .accent {
    width: 120px; height: 4px; background: linear-gradient(90deg, transparent, #5a8299, transparent);
    margin: 36px auto 0;
  }
</style>
</head>
<body>
  <div class="grain"></div>
  <div class="wrap">
    <div class="badge">Yakushima Bus</div>
    <h1 id="title">Title</h1>
    <div class="accent"></div>
    <p class="sub" id="subtitle">Subtitle</p>
  </div>
  <div class="logo-row">yakushimabus.com</div>
  <script>
    const p = new URLSearchParams(location.search);
    document.getElementById('title').textContent = p.get('title') || 'Title';
    document.getElementById('subtitle').textContent = p.get('subtitle') || '';
  </script>
</body>
</html>
