<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="屋久島上島交通：鹿児島↔宮之浦 高速船・フェリー時刻・運賃。2026夏季表。日中英。">
  <meta name="robots" content="index, follow">
  <meta name="theme-color" content="#143a35">
  <meta name="geo.placename" content="Yakushima, Kagoshima, Japan">
  <link rel="canonical" href="https://yakushimabus.com/access.html">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Yakushima Bus Now">
  <meta property="og:title" content="屋久岛上岛交通 | Yakushima Ferry &amp; Jetfoil">
  <meta property="og:description" content="Jetfoil and ferry schedules, fares Kagoshima to Yakushima.">
  <meta property="og:url" content="https://yakushimabus.com/access.html">
  <meta name="twitter:card" content="summary">
  <title>上岛交通 | 屋久島フェリー | Yakushima Access</title>
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebPage",
    "name": "Yakushima Island Access — Ferry and Jetfoil",
    "url": "https://yakushimabus.com/access.html",
    "description": "Ferry and jetfoil timetables and fares between Kagoshima and Yakushima.",
    "isPartOf": { "@type": "WebSite", "name": "Yakushima Bus Now", "url": "https://yakushimabus.com/" }
  }
  </script>
  <link rel="stylesheet" href="styles.css?v=rainforest-preview">
</head>
<body>
  <div class="app">
    <nav class="nav nav-main">
      <a href="index.html" data-i18n="navTime">時刻表</a>
      <a href="map.html" data-i18n="navMap">路線図</a>
      <a href="access.html" class="active" data-i18n="navAccess">上島</a>
    </nav>

    <header class="header header-compact">
      <div class="header-main">
        <h1 id="appTitle">上島交通</h1>
      </div>
      <div class="header-actions">
        <div class="lang-switch" id="langSwitch">
          <button type="button" data-lang="ja">日</button>
          <button type="button" data-lang="zh">中</button>
          <button type="button" data-lang="en">EN</button>
        </div>
      </div>
    </header>

    <div class="meta" id="metaBar"></div>

    <div class="panel">
      <div class="sec">
        <p class="intro-text" id="introText"></p>
      </div>
    </div>

    <div id="sections"></div>

    <div class="panel">
      <div class="sec">
        <div class="sec-title" data-i18n="sources">公式リンク</div>
        <div class="links" id="sourceLinks"></div>
        <p class="disclaimer" id="disclaimer"></p>
      </div>
    </div>

    <footer class="app-footer">
      <a href="about.html" data-i18n="navAbout">このサイトについて</a>
    </footer>
  </div>

  <script src="access-data.js"></script>
  <script>
    const UI = {
      ja: { navTime: "バス時刻表", navMap: "路線・運賃", navAccess: "フェリー等", navAbout: "このサイトについて", title: "フェリー・上島", sources: "公式リンク", updated: "更新", source: "出典" },
      zh: { navTime: "公交时刻表", navMap: "路线及价格", navAccess: "轮渡·上岛", navAbout: "关于本站", title: "轮渡·上岛", sources: "官方链接", updated: "更新", source: "来源" },
      en: { navTime: "Bus timetable", navMap: "Routes & fares", navAccess: "Ferry access", navAbout: "About", title: "Ferry & access", sources: "Official links", updated: "Updated", source: "Source" },
    };

    let lang = localStorage.getItem("yakushima-bus-lang") || "ja";

    const els = {
      langSwitch: document.getElementById("langSwitch"),
      appTitle: document.getElementById("appTitle"),
      metaBar: document.getElementById("metaBar"),
      introText: document.getElementById("introText"),
      sections: document.getElementById("sections"),
      sourceLinks: document.getElementById("sourceLinks"),
      disclaimer: document.getElementById("disclaimer"),
    };

    function t(k) { return (UI[lang] && UI[lang][k]) || UI.ja[k] || k; }
    function pick(o) {
      if (o == null) return "";
      if (typeof o === "string" || typeof o === "number") return String(o);
      return o[lang] || o.ja || o.en || o.zh || "";
    }

    function renderCell(val) {
      return pick(val);
    }

    function renderSection(sec) {
      const srcKey = sec.sourceKey;
      const srcUrl = ACCESS_DATA.meta.sources[srcKey];
      const srcLabel = pick(ACCESS_DATA.meta.sourceLabels[srcKey] || {});
      const note = sec.note ? `<p class="table-note">${pick(sec.note)}</p>` : "";
      const sourceLine = srcUrl
        ? `<p class="table-source">${t("source")}: <a href="${srcUrl}" target="_blank" rel="noopener">${srcLabel || srcUrl}</a></p>`
        : "";
      const head = sec.columns.map((c) => `<th>${pick(c.label)}</th>`).join("");
      const body = sec.rows.map((row) =>
        `<tr>${sec.columns.map((c) => `<td>${renderCell(row[c.key])}</td>`).join("")}</tr>`
      ).join("");
      return `<div class="panel">
        <div class="sec">
          <div class="sec-title">${pick(sec.title)}</div>
          ${note}
          <div class="table-wrap"><table class="data-table"><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table></div>
          ${sourceLine}
        </div>
      </div>`;
    }

    function applyI18n() {
      document.documentElement.lang = lang === "zh" ? "zh-CN" : lang;
      document.querySelectorAll("[data-i18n]").forEach((el) => { el.textContent = t(el.dataset.i18n); });
      els.langSwitch.querySelectorAll("button").forEach((b) => b.classList.toggle("active", b.dataset.lang === lang));
      els.appTitle.textContent = t("title");
      els.metaBar.innerHTML = `<span class="chip">${t("updated")} ${ACCESS_DATA.meta.updatedAt}</span>`;
      els.introText.textContent = pick(ACCESS_DATA.intro);
      els.sections.innerHTML = ACCESS_DATA.sections.filter((s) => s.id !== "pass").map(renderSection).join("");
      els.sourceLinks.innerHTML = ACCESS_DATA.links.map((l) =>
        `<a href="${ACCESS_DATA.meta.sources[l.key]}" target="_blank" rel="noopener">${pick(l.label)}</a>`
      ).join("");
      els.disclaimer.textContent = pick(ACCESS_DATA.disclaimer);
    }

    els.langSwitch.addEventListener("click", (e) => {
      const btn = e.target.closest("button[data-lang]");
      if (!btn) return;
      lang = btn.dataset.lang;
      localStorage.setItem("yakushima-bus-lang", lang);
      applyI18n();
    });

    applyI18n();
  </script>
</body>
</html>
