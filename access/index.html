<body class="app-page-narrow">

        <p class="header-sub" data-i18n="pageLead">鹿児島↔屋久島 高速船・フェリー</p>

            <span class="tz-mark-text">JST</span>

          <button type="button" data-lang="en">EN</button>
        </div>

    <p class="app-meta" id="metaBar"></p>
    <p class="intro-text access-intro" id="introText">鹿児島から屋久島へは高速船（約2–3時間）かフェリー（約4時間）が一般的です。島内は路線バス（時刻表タブ）が中心。最新ダイヤ・運休は各社公式を確認してください。</p>

  <script src="/access-data.js?v=booking-v3"></script>
  <script src="/section-divider.js"></script>
  <script src="/app-core.js"></script>
  <script>
    const UI = {
      ja: { navAria: "メインメニュー", siteBrand: "屋久島バス", pageLead: "鹿児島↔屋久島 高速船・フェリー",
        navTime: "時刻表", navMap: "路線・運賃", navAccess: "上島", navAbout: "このサイトについて", title: "フェリー・上島", sources: "公式リンク", updated: "更新", source: "出典", adult: "大人", child: "小児", fareColRoute: "区間", fareColType: "区分", kindSchedule: "時刻表", kindFare: "運賃", dividerJetfoil: "高速船", dividerFerry: "フェリー" },
      zh: { navAria: "主菜单", siteBrand: "屋久岛公交", pageLead: "鹿儿岛↔屋久岛 高速船与渡轮",
        navTime: "时刻表", navMap: "路线·运价", navAccess: "上岛", navAbout: "关于本站", title: "轮渡·上岛", sources: "官方链接", updated: "更新", source: "来源", adult: "成人", child: "儿童", fareColRoute: "区间", fareColType: "类型", kindSchedule: "时刻表", kindFare: "运价", dividerJetfoil: "高速船", dividerFerry: "渡轮" },
      en: { navAria: "Main menu", siteBrand: "Yakushima Bus", pageLead: "Kagoshima ↔ Yakushima jetfoil & ferry",
        navTime: "Timetable", navMap: "Routes", navAccess: "Ferry", navAbout: "About", title: "Ferry & access", sources: "Official links", updated: "Updated", source: "Source", adult: "Adult", child: "Child", fareColRoute: "Route", fareColType: "Class", kindSchedule: "Timetable", kindFare: "Fares", dividerJetfoil: "Jetfoil", dividerFerry: "Ferry" },
    };

    let lang = localStorage.getItem("yakushima-bus-lang") || "ja";

    const els = {
      langSwitch: document.getElementById("langSwitch"),
      appTitle: document.getElementById("appTitle"),
      liveClockTime: document.getElementById("liveClockTime"),
      metaBar: document.getElementById("metaBar"),
      introText: document.getElementById("introText"),
      bookingTitle: document.getElementById("bookingTitle"),
      bookingCards: document.getElementById("bookingCards"),
      sections: document.getElementById("sections"),
      sourceLinks: document.getElementById("sourceLinks"),
      disclaimer: document.getElementById("disclaimer"),
    };

    function t(k) { return (UI[lang] && UI[lang][k]) || UI.ja[k] || k; }
    function pick(o) {
      if (o == null) return "";
      if (typeof o === "string" || typeof o === "number") return String(o);
      return o[lang] || o.ja || o.en || o.zh || "";
    }

    function renderCell(val) {
      return pick(val);
    }

    function renderBooking() {
      const b = ACCESS_DATA.booking;
      if (!b || !els.bookingCards) return;
      els.bookingTitle.textContent = pick(b.title);
      const cards = [];
      b.items.forEach((item, i) => {
        const badge = item.badge ? `<span class="access-booking-badge">${pick(item.badge)}</span>` : "";
        const duration = item.duration ? `<span class="access-booking-duration">${pick(item.duration)}</span>` : "";
        cards.push(`<article class="access-booking-card access-booking-card--${item.id}">
          <div class="access-booking-head">
            <div class="access-booking-name-row">
              <h3 class="access-booking-name">${pick(item.title)}</h3>
              ${duration}
            </div>
            ${badge}
          </div>
          <p class="access-booking-body">${pick(item.body)}</p>
          <div class="access-booking-actions">
            <a class="access-booking-btn access-booking-btn-primary" href="${item.ctaUrl}" target="_blank" rel="noopener">${pick(item.ctaLabel)}</a>
          </div>
        </article>`);
      });
      els.bookingCards.innerHTML = cards.join("") + (b.footerHint ? `<p class="access-booking-hint">${pick(b.footerHint)}</p>` : "");
    }

    function tickClock() {
      if (!els.liveClockTime || typeof AppCore === "undefined") return;
      const jp = AppCore.japanParts();
      els.liveClockTime.textContent = `${jp.hour}:${jp.minute}`;
      els.liveClockTime.title = lang === "zh"
        ? `日本标准时间 (JST · UTC+9)`
        : (lang === "en" ? "Japan Standard Time (JST · UTC+9)" : "日本標準時 (JST · UTC+9)");
    }

    function modeDividerHtml(kind) {
      if (!kind) return "";
      const label = kind === "jetfoil" ? t("dividerJetfoil") : t("dividerFerry");
      return `<div class="access-mode-divider">${SectionDivider.html(kind, label)}</div>`;
    }

    function sectionMode(sec) {
      if (sec.id.startsWith("jetfoil")) return "jetfoil";
      if (sec.id.startsWith("ferry")) return "ferry";
      return null;
    }

    function renderSchedulePart(sec) {
      const srcKey = sec.sourceKey;
      const srcUrl = ACCESS_DATA.meta.sources[srcKey];
      const srcLabel = pick(ACCESS_DATA.meta.sourceLabels[srcKey] || {});
      const note = sec.note ? `<p class="table-note">${pick(sec.note)}</p>` : "";
      const sourceLine = srcUrl
        ? `<p class="table-source">${t("source")}: <a href="${srcUrl}" target="_blank" rel="noopener">${srcLabel || srcUrl}</a></p>`
        : "";
      const head = sec.columns.map((c) => `<th>${pick(c.label)}</th>`).join("");
      const body = sec.rows.map((row) =>
        `<tr>${sec.columns.map((c) => `<td>${renderCell(row[c.key])}</td>`).join("")}</tr>`
      ).join("");
      return `<section class="access-mode-part access-mode-part--schedule">
          <p class="access-sec-kind">${t("kindSchedule")}</p>
          <div class="sec-title">${pick(sec.title)}</div>
          ${note}
          <div class="table-wrap"><table class="data-table"><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table></div>
          ${sourceLine}
        </section>`;
    }

    function renderFarePart(sec) {
      const srcKey = sec.sourceKey;
      const srcUrl = ACCESS_DATA.meta.sources[srcKey];
      const srcLabel = pick(ACCESS_DATA.meta.sourceLabels[srcKey] || {});
      const note = sec.note ? `<p class="table-note">${pick(sec.note)}</p>` : "";
      const sourceLine = srcUrl
        ? `<p class="table-source">${t("source")}: <a href="${srcUrl}" target="_blank" rel="noopener">${srcLabel || srcUrl}</a></p>`
        : "";
      const labelKey = sec.fareKey || "route";
      const colLabel = labelKey === "type" ? t("fareColType") : t("fareColRoute");
      const body = sec.rows.map((row) => {
        const sub = row.sub ? ' class="fare-sub"' : "";
        return `<tr${sub}><td>${pick(row[labelKey])}</td><td>${row.adult}</td><td>${row.child}</td></tr>`;
      }).join("");
      return `<section class="access-mode-part access-mode-part--fare">
          <p class="access-sec-kind">${t("kindFare")}</p>
          <div class="sec-title">${pick(sec.title)}</div>
          ${note}
          <div class="table-wrap"><table class="data-table access-fare-table"><thead><tr><th>${colLabel}</th><th>${t("adult")}</th><th>${t("child")}</th></tr></thead><tbody>${body}</tbody></table></div>
          ${sourceLine}
        </section>`;
    }

    function renderSectionPart(sec) {
      if (sec.kind === "fare") return renderFarePart(sec);
      return renderSchedulePart(sec);
    }

    function renderModeBlock(mode, sections) {
      const parts = sections.map((sec) => renderSectionPart(sec)).join("");
      return `<div class="panel access-mode-panel access-mode-panel--${mode}">
        <div class="sec">
          ${modeDividerHtml(mode)}
          <div class="access-mode-body">${parts}</div>
        </div>
      </div>`;
    }

    function applyI18n() {
      document.documentElement.lang = lang === "zh" ? "zh-CN" : lang;
      document.querySelectorAll("[data-i18n]").forEach((el) => { el.textContent = t(el.dataset.i18n); });
      els.langSwitch.querySelectorAll("button").forEach((b) => b.classList.toggle("active", b.dataset.lang === lang));
      els.appTitle.textContent = t("siteBrand");
      const mainNav = document.getElementById("mainNav");
      if (mainNav) mainNav.setAttribute("aria-label", t("navAria"));
      els.metaBar.textContent = `${t("updated")} ${ACCESS_DATA.meta.updatedAt}`;
      if (ACCESS_DATA.introHtml) els.introText.innerHTML = pick(ACCESS_DATA.introHtml);
      else els.introText.textContent = pick(ACCESS_DATA.intro);
      tickClock();
      renderBooking();
      const blocks = [];
      const list = ACCESS_DATA.sections.filter((s) => s.id !== "pass");
      let group = [];
      let groupMode = null;
      const flushMode = () => {
        if (group.length && groupMode) blocks.push(renderModeBlock(groupMode, group));
        group = [];
        groupMode = null;
      };
      list.forEach((sec) => {
        const mode = sectionMode(sec);
        if (!mode) {
          flushMode();
          blocks.push(renderSectionPart(sec));
          return;
        }
        if (mode !== groupMode) {
          flushMode();
          groupMode = mode;
        }
        group.push(sec);
      });
      flushMode();
      els.sections.innerHTML = blocks.join("");
      els.sourceLinks.innerHTML = ACCESS_DATA.links.map((l) =>
        `<a href="${ACCESS_DATA.meta.sources[l.key]}" target="_blank" rel="noopener">${pick(l.label)}</a>`
      ).join("");
      els.disclaimer.textContent = pick(ACCESS_DATA.disclaimer);
    }

    els.langSwitch.addEventListener("click", (e) => {
      const btn = e.target.closest("button[data-lang]");
      if (!btn) return;
      lang = btn.dataset.lang;
      localStorage.setItem("yakushima-bus-lang", lang);
      applyI18n();
    });

    applyI18n();
    setInterval(tickClock, 30000);
  </script>
