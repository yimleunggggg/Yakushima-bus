<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="屋久岛公交时刻表、运价、船运、观光地图与登山参考的三语工具站介绍。Yakushima bus timetable, fares, ferry & POI map — product tour.">
  <meta name="keywords" content="屋久岛,公交,时刻表,运价,屋久島,バス,時刻表,Yakushima,bus,timetable">
  <meta name="robots" content="noindex, follow">
  <meta name="theme-color" content="#143a35">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="canonical" href="https://yakushimabus.com/intro/">
  <meta property="og:title" content="Yakushima Bus — Product tour">
  <meta property="og:url" content="https://yakushimabus.com/intro/">
  <meta property="og:image" content="https://yakushimabus.com/og-image.png">
  <title>製品紹介 | 产品介绍 | Yakushima Bus Intro</title>
  <link rel="stylesheet" href="/styles.css?v=layout-v123">
  <script src="/analytics.js"></script>
  <script src="/analytics-events.js?v=analytics-v4" defer></script>
  <script src="/site-chrome.js?v=chrome-v20" defer></script>
</head>
<body class="app-page-narrow">
  <div class="app intro-page">
    <div class="app-nav-sticky">
      <nav class="nav nav-main nav-main--6" id="mainNav" aria-label="Main">
        <a href="/map/">マップ</a>
        <a href="/">時刻表</a>
        <a href="/fare/">運賃</a>
        <a href="/ferry/">フェリー</a>
        <a href="/trekking/">登山</a>
        <a href="/intro/" class="active" aria-current="page">紹介</a>
      </nav>
      <script src="/site-chrome-nav-boot.js?v=chrome-v19"></script>
    </div>

    <header class="intro-hero">
      <div class="intro-hero-top">
        <div class="lang-switch" id="langSwitch">
          <button type="button" data-lang="ja">JA</button>
          <button type="button" data-lang="zh">ZH</button>
          <button type="button" data-lang="en">EN</button>
        </div>
      </div>
      <h1 id="introTitle">Yakushima Bus とは</h1>
      <p class="intro-hero-lead" id="introLead"></p>
      <p class="app-meta meta-links" id="introCross"></p>
    </header>

    <section class="intro-video-block panel" aria-labelledby="introVideoTitle">
      <h2 class="intro-section-title" id="introVideoTitle">デモ動画</h2>
      <p class="intro-video-hint" id="introVideoHint"></p>
      <div class="intro-video-wrap">
        <video
          id="introVideo"
          class="intro-video-player"
          controls
          playsinline
          preload="auto"
          poster="/assets/video/yakushima-bus-demo-poster.jpg"
        >
          <source id="introVideoSource" type="video/mp4">
        </video>
      </div>
    </section>

    <section class="intro-features" id="introFeatures" aria-label="Features"></section>

    <section class="intro-sources panel" id="sources" aria-labelledby="introSourcesTitle">
      <h2 class="intro-section-title" id="introSourcesTitle"></h2>
      <div id="introSourcesBody"></div>
    </section>

    <footer class="app-footer"></footer>
  </div>

  <script src="/source-links.js?v=src-v1"></script>
  <script src="/sources-data.js?v=3"></script>
  <script src="/intro-data.js?v=intro-v14"></script>
  <script src="/app-core.js?v=core-v9"></script>
  <script>
    const NAV_UI = {};

    let lang = AppCore.resolveLang();
    let introVideoSec = 0;
    let langBooted = false;
    const t = (key) => (NAV_UI[lang] && NAV_UI[lang][key]) || NAV_UI.ja?.[key] || key;

    function syncLangSwitch() {
      document.querySelectorAll("#langSwitch [data-lang]").forEach((b) => {
        b.classList.toggle("active", b.dataset.lang === lang);
      });
    }

    function setLang(next) {
      if (langBooted && next === lang) {
        syncLangSwitch();
        return;
      }
      lang = next;
      AppCore.setLang(lang);
      const url = new URL(location.href);
      url.searchParams.set("lang", lang);
      history.replaceState(null, "", url);
      if (window.__renderSiteChromeNav) window.__renderSiteChromeNav(lang);
      syncLangSwitch();
      render();
      langBooted = true;
    }

    function pick(o) {
      if (o == null) return "";
      if (typeof o === "string" || typeof o === "number") return String(o);
      return o[lang] || o.ja || o.en || o.zh || "";
    }

    function renderSources() {
      const d = window.SOURCES_DATA;
      const el = document.getElementById("introSourcesBody");
      const titleEl = document.getElementById("introSourcesTitle");
      if (!d || !el) return;
      titleEl.textContent = SourceLinks.pick(d.title, lang);
      el.innerHTML = SourceLinks.introBodyHtml(
        { intro: d.intro, groups: d.sourceGroups },
        lang,
      );
    }

    function formatDuration(sec, l) {
      if (!sec || !Number.isFinite(sec)) return "";
      const min = Math.floor(sec / 60);
      const s = sec % 60;
      if (min > 0) {
        if (l === "en") return `${min} min ${s}s`;
        if (l === "zh") return `${min} 分 ${s} 秒`;
        return `${min}分${s}秒`;
      }
      if (l === "en") return `${sec}s`;
      if (l === "zh") return `${sec} 秒`;
      return `${sec}秒`;
    }

    function videoHintText(c, l) {
      const base = c.videoHintBase || "";
      if (!introVideoSec) return base.replace("{duration}", "…");
      return base.replace("{duration}", formatDuration(introVideoSec, l));
    }

    function featureHref(href) {
      if (!href || href.startsWith("#")) return href;
      const sep = href.includes("?") ? "&" : "?";
      return `${href}${sep}lang=${lang}`;
    }

    function render() {
      const c = INTRO_DATA.content[lang] || INTRO_DATA.content.ja;
      document.documentElement.lang = lang === "zh" ? "zh-CN" : lang;
      document.getElementById("introTitle").textContent = c.title;
      document.getElementById("introLead").textContent = c.lead;
      if (window.SiteChrome) {
        SiteChrome.applyPageHead("intro", { crossEl: document.getElementById("introCross"), lang });
      }
      document.getElementById("introVideoTitle").textContent = c.videoTitle;
      const hintEl = document.getElementById("introVideoHint");
      const hint = videoHintText(c, lang);
      if (hintEl) {
        hintEl.textContent = hint;
        hintEl.hidden = !hint.trim();
      }
      document.getElementById("introFeatures").innerHTML = c.features
        .map(
          (f) => `
        <a class="intro-feature panel" href="${featureHref(f.href)}">
          <h3 class="intro-feature-title">${f.title}</h3>
          <p class="intro-feature-body">${f.body}</p>
        </a>`
        )
        .join("");

      document.querySelectorAll("[data-i18n]").forEach((el) => {
        const key = el.getAttribute("data-i18n");
        if (NAV_UI[lang]?.[key]) el.textContent = NAV_UI[lang][key];
      });
      renderSources();
    }

    document.getElementById("langSwitch").addEventListener("click", (e) => {
      const btn = e.target.closest("[data-lang]");
      if (!btn) return;
      setLang(btn.dataset.lang);
    });

    window.addEventListener("yakushima-bus-lang", (e) => {
      const next = e.detail?.lang;
      if (next && next !== lang) setLang(next);
    });

    (async function initIntroVideo() {
      const v = INTRO_DATA.video;
      const video = document.getElementById("introVideo");
      const src = document.getElementById("introVideoSource");
      if (v.poster) video.poster = v.poster;
      src.type = v.type || "video/mp4";
      if (v.src) src.src = v.src;
      video.addEventListener(
        "loadedmetadata",
        () => {
          introVideoSec = Math.round(video.duration);
          render();
        },
        { once: true }
      );
      video.load();
    })();

    AppCore.runPageBoot((resolvedLang) => {
      setLang(resolvedLang);
    });
  </script>
</body>
</html>
