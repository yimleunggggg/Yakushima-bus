<body class="app-page-narrow">
  <script>if (location.hash === "#sources") location.replace("/intro/#sources");</script>
  <div class="app">
    <div class="app-nav-sticky">
      <nav class="nav nav-main nav-main--6" id="mainNav">
        <a href="/" data-i18n="navTime">時刻表</a>
        <a href="/map/" data-i18n="navMap">路線・運賃</a>
        <a href="/access/" data-i18n="navAccess">上島</a>

        <a href="/guide/" data-i18n="navGuide">便利</a>
        <a href="/intro/" data-i18n="navIntro">紹介</a>
      </nav>
      <script src="/site-chrome-nav-boot.js?v=chrome-v10"></script>
    </div>

    <header class="header header-compact">
      <h1 id="appTitle">このサイトについて</h1>
      <div class="header-actions">
        <div class="lang-switch" id="langSwitch">
          <button type="button" data-lang="ja">JA</button>
          <button type="button" data-lang="zh">ZH</button>
          <button type="button" data-lang="en">EN</button>
        </div>
      </div>
    </header>

    <p class="app-meta" id="metaBar"></p>

    <div class="panel">
      <div class="sec about-body" id="aboutSections"></div>
    </div>

    <footer class="app-footer"></footer>
  </div>

  <script src="/about-data.js?v=about-v4"></script>
  <script>
    const UI = {
      ja: {
        navAria: "メインメニュー", siteBrand: "屋久島バス",
        navTime: "時刻表", navMap: "路線・運賃", navAccess: "上島", navTrek: "登山", navGuide: "便利", navIntro: "紹介",
        title: "このサイトについて", sub: "データ出典・連絡先",
        updated: "更新", contactHeading: "連絡先", contactEmail: "Email", contactInstagram: "Instagram", contactKofi: "Ko-fi", supportKofi: "コーヒーをおごる", backHome: "時刻表に戻る",
      },
      zh: {
        navAria: "主菜单", siteBrand: "屋久岛公交",
        navTime: "时刻表", navMap: "路线·运价", navAccess: "上岛", navTrek: "登山", navGuide: "指南", navIntro: "介绍",
        title: "关于本站", sub: "说明、数据来源与联系方式",
        updated: "更新", contactHeading: "联系方式", contactEmail: "Email", contactInstagram: "Instagram", contactKofi: "Ko-fi", supportKofi: "支持本站", backHome: "返回时刻表",
      },
      en: {
        navAria: "Main menu", siteBrand: "Yakushima Bus",
        navTime: "Timetable", navMap: "Routes", navAccess: "Ferry", navTrek: "Trek", navGuide: "Guide", navIntro: "Intro",
        title: "About", sub: "What this is, sources & contact",
        updated: "Updated", contactHeading: "Contact", contactEmail: "Email", contactInstagram: "Instagram", contactKofi: "Ko-fi", supportKofi: "Buy me a coffee", backHome: "Back to timetable",
      },
    };

    let lang = localStorage.getItem("yakushima-bus-lang") || "ja";

    const els = {
      langSwitch: document.getElementById("langSwitch"),
      appTitle: document.getElementById("appTitle"),
      metaBar: document.getElementById("metaBar"),
      aboutSections: document.getElementById("aboutSections"),
      backLink: document.getElementById("backLink"),
    };

    function t(k) { return (UI[lang] && UI[lang][k]) || UI.ja[k] || k; }

    function pick(o) {
      if (o == null) return "";
      if (typeof o === "string") return o;
      return o[lang] || o.ja || o.en || o.zh || "";
    }

    const ICON_MAIL = `<svg class="contact-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></svg>`;
    const ICON_IG = `<svg class="contact-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg>`;
    const ICON_KOFI = `<svg class="contact-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true"><path d="M6 8h12v9a3 3 0 0 1-3 3H9a3 3 0 0 1-3-3V8Z"/><path d="M6 8V6a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v2"/><path d="M10 12h4"/></svg>`;

    function instagramHandle(url) {
      const m = String(url || "").match(/instagram\.com\/([^/?#]+)/i);
      return m ? `@${m[1]}` : pick(ABOUT_DATA.contact.instagramLabel);
    }

    function renderContact() {
      const c = ABOUT_DATA.contact;
      const igRow = c.instagram
        ? `<li>
            <a class="contact-item" href="${c.instagram}" target="_blank" rel="noopener noreferrer">
              <span class="contact-icon contact-icon-ig">${ICON_IG}</span>
              <span class="contact-body">
                <span class="contact-label">${t("contactInstagram")}</span>
                <span class="contact-value">${instagramHandle(c.instagram)}</span>
              </span>
            </a>
          </li>`
        : "";
      const kofiRow = c.kofi
        ? `<li>
            <a class="contact-item" href="${c.kofi}" target="_blank" rel="noopener noreferrer">
              <span class="contact-icon contact-icon-kofi">${ICON_KOFI}</span>
              <span class="contact-body">
                <span class="contact-label">${t("contactKofi")}</span>
                <span class="contact-value">${t("supportKofi")}</span>
              </span>
            </a>
          </li>`
        : "";
      return `<div class="contact-block">
        <h3 class="contact-heading">${t("contactHeading")}</h3>
        <ul class="contact-list">
          <li>
            <a class="contact-item" href="mailto:${c.email}">
              <span class="contact-icon contact-icon-mail">${ICON_MAIL}</span>
              <span class="contact-body">
                <span class="contact-label">${t("contactEmail")}</span>
                <span class="contact-value">${c.email}</span>
              </span>
            </a>
          </li>
          ${igRow}
          ${kofiRow}
        </ul>
      </div>`;
    }

    function formatBody(text) {
      return pick(text)
        .split(/\n\n+/)
        .map((p) => `<p>${p}</p>`)
        .join("");
    }

    function renderSections() {
      const leadHtml = ABOUT_DATA.lead
        ? `<div class="about-lead about-prose">${formatBody(ABOUT_DATA.lead)}</div>`
        : "";
      const sectionsHtml = ABOUT_DATA.sections.map((sec) => {
        const toneClass = sec.tone === "trust" ? " about-section-trust" : "";
        const contactHtml = sec.showContact ? renderContact() : "";
        const idAttr = sec.id ? ` id="${sec.id}"` : "";
        return `<section class="about-section${toneClass}"${idAttr}>
          <h2>${pick(sec.title)}</h2>
          <div class="about-prose">${formatBody(sec.body)}</div>
          ${contactHtml}
        </section>`;
      }).join("");
      els.aboutSections.innerHTML = leadHtml + sectionsHtml;
    }

    function applyI18n() {
      document.documentElement.lang = lang === "zh" ? "zh-CN" : lang;
      document.querySelectorAll("[data-i18n]").forEach((el) => { el.textContent = t(el.dataset.i18n); });
      els.langSwitch.querySelectorAll("button").forEach((b) => b.classList.toggle("active", b.dataset.lang === lang));
      els.appTitle.textContent = t("title");
      const mainNav = document.getElementById("mainNav");
      if (mainNav) mainNav.setAttribute("aria-label", t("navAria"));
      els.metaBar.textContent = `${t("updated")} ${ABOUT_DATA.meta.updatedAt}`;
      renderSections();
    }

    els.langSwitch.addEventListener("click", (e) => {
      const btn = e.target.closest("button[data-lang]");
      if (!btn) return;
      lang = btn.dataset.lang;
      localStorage.setItem("yakushima-bus-lang", lang);
      window.dispatchEvent(new CustomEvent("yakushima-bus-lang", { detail: { lang } }));
      applyI18n();
    });

    applyI18n();
  </script>
</body>
</html>
